<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="work">
            <div id="paneltop">
                <div class="score">
                    <div class="elem">Hit</div>
                    <div class="box js-hit">5</div>
                </div>
                <div class="score">
                    <div class="elem">Timer</div>
                    <div class="box js-timer">60</div>
                </div>
                <div class="score">
                    <div class="elem">Score</div>
                    <div class="box js-score">0</div>
                </div>
            </div>
            <div id="panelbottom">
                <div class="bubble">6</div>           
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
